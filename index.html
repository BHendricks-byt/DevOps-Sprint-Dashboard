<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Sprint Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1d2029;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0;
    --text-muted: #7a7f94;
    --text-dim: #4a4f63;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #22c97a;
    --amber: #f5a623;
    --red: #f05c5c;
    --blue: #4f8ef7;
    --purple: #9b72f5;
    --teal: #2dd4bf;
    --font-display: 'Sora', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --radius: 10px;
    --radius-lg: 16px;
  }

  body {
    font-family: var(--font-display);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .header-left p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    font-family: var(--font-mono);
  }

  .sprint-nav {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .sprint-btn {
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .sprint-btn:hover { background: var(--surface2); color: var(--text); }
  .sprint-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .badge {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }

  .badge-active { background: rgba(34,201,122,0.15); color: var(--green); }
  .badge-closed { background: rgba(122,127,148,0.15); color: var(--text-muted); }

  /* Main layout */
  .main { padding: 24px 32px; max-width: 1400px; }

  /* Metrics row */
  .metrics-row {
    display: grid;
    grid-template-columns: repeat(5, minmax(0,1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }

  .metric-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .metric-value {
    font-size: 28px;
    font-weight: 600;
    line-height: 1;
    color: var(--text);
  }

  .metric-value.green { color: var(--green); }
  .metric-value.amber { color: var(--amber); }
  .metric-value.blue { color: var(--blue); }
  .metric-value.purple { color: var(--purple); }

  /* Progress bar */
  .progress-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .progress-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    min-width: 160px;
  }

  .progress-track {
    flex: 1;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--green);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .progress-pct {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--green);
    min-width: 36px;
    text-align: right;
  }

  /* Charts row */
  .charts-row {
    display: grid;
    grid-template-columns: 260px minmax(0,1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }

  .panel-title {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 14px;
  }

  /* Donut legend */
  .donut-wrap { position: relative; width: 160px; height: 160px; margin: 0 auto 14px; }
  .donut-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .donut-center-val { font-size: 24px; font-weight: 600; color: var(--text); }
  .donut-center-lbl { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }

  .legend { display: flex; flex-direction: column; gap: 6px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .legend-count { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--text); }

  /* Project bars panel */
  .proj-bars { display: flex; flex-direction: column; gap: 10px; }
  .proj-row { display: flex; flex-direction: column; gap: 4px; }
  .proj-meta { display: flex; justify-content: space-between; font-size: 12px; }
  .proj-name { color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%; }
  .proj-count { font-family: var(--font-mono); color: var(--text); font-size: 11px; }
  .proj-track { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .proj-fill { height: 100%; border-radius: 2px; background: var(--accent); }

  /* Team grid */
  .team-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
    margin-bottom: 20px;
  }

  .team-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: var(--accent);
    flex-shrink: 0; font-family: var(--font-mono);
  }

  .team-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .team-stats { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 1px; }

  /* Table */
  .table-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 32px;
  }

  .table-toolbar {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .table-toolbar .panel-title { margin: 0; flex: 1; }

  select {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 10px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text-muted);
    cursor: pointer;
    outline: none;
  }

  select:focus { border-color: var(--accent); color: var(--text); }

  table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
  thead tr { background: var(--surface2); }
  th {
    text-align: left; padding: 9px 14px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 500;
    color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em;
  }
  td { padding: 9px 14px; border-top: 1px solid var(--border); color: var(--text-muted); }
  tr:hover td { background: var(--surface2); }

  .key-cell { color: var(--accent); font-family: var(--font-mono); font-weight: 500; }
  .summary-cell { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .pill {
    font-family: var(--font-mono);
    font-size: 10px; padding: 2px 8px;
    border-radius: 4px; white-space: nowrap;
    font-weight: 500;
  }

  .sp-cell { text-align: center; font-family: var(--font-mono); }

  /* Footer links */
  .footer-links {
    display: flex; gap: 16px; justify-content: flex-end;
    font-size: 11px; font-family: var(--font-mono);
    margin-bottom: 24px;
  }
  .footer-links a { color: var(--accent); text-decoration: none; opacity: 0.8; }
  .footer-links a:hover { opacity: 1; }

  @media (max-width: 768px) {
    .main { padding: 16px; }
    .metrics-row { grid-template-columns: repeat(3, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
  }
</style>
</head>

        </thead>
        <tbody id="issue-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="footer-links">

    <a href="https://ecentive.atlassian.net/wiki/spaces/SD/pages/152502273" target="_blank">Confluence reports &rarr;</a>
  </div>

</div>

const STATUS_COLORS = {
  'Done (Production)': '#22c97a','Done': '#22c97a','MOVED TO QA': '#4f8ef7',
  'In Progress': '#f5a623','To Do': '#9b72f5','Parked': '#4a4f63',
  'Canceled': '#f05c5c','removed': '#f05c5c','Ready For Production': '#2dd4bf','In Review': '#c084fc'
};
const STATUS_BG = {
  'Done (Production)': 'rgba(34,201,122,0.12)','Done': 'rgba(34,201,122,0.12)',
  'MOVED TO QA': 'rgba(79,142,247,0.12)','In Progress': 'rgba(245,166,35,0.12)',
  'To Do': 'rgba(155,114,245,0.12)','Parked': 'rgba(74,79,99,0.3)',
  'Canceled': 'rgba(240,92,92,0.12)','removed': 'rgba(240,92,92,0.12)',
  'Ready For Production': 'rgba(45,212,191,0.12)','In Review': 'rgba(192,132,252,0.12)'
};

let currentSprint = 'Sprint 0';
let currentStatus = 'all';
let currentProject = 'all';
let donutChart = null;

function stats(issues) {
  const done = issues.filter(i => i.status==='Done (Production)'||i.status==='Done').length;
  return {
    total: issues.length,
    sp: issues.reduce((s,i)=>s+(i.sp||0),0),
    done,
    inProgress: issues.filter(i=>i.status==='In Progress').length,
    qa: issues.filter(i=>i.status==='MOVED TO QA').length,
    parked: issues.filter(i=>i.status==='Parked').length,
    pct: Math.round((done/issues.length)*100)
  };
}

function renderAll() {
  const s = SPRINTS[currentSprint];
  const issues = s.issues;
  const st = stats(issues);

  // Nav
  document.getElementById('sprint-nav').innerHTML = Object.keys(SPRINTS).map(k =>
    `<button class="sprint-btn${k===currentSprint?' active':''}" onclick="switchSprint('${k}')">${k}</button>`
  ).join('');

  // Meta
  const stateClass = s.state==='Active' ? 'badge-active' : 'badge-closed';
  document.getElementById('sprint-meta').innerHTML =
    `${s.name} &nbsp;&nbsp; ${s.period} &nbsp;&nbsp;<span class="badge ${stateClass}">${s.state}</span>`;

  // Metrics
  document.getElementById('metrics-row').innerHTML = `
    <div class="metric-card"><p class="metric-label">Total issues</p><p class="metric-value">${st.total}</p></div>
    <div class="metric-card"><p class="metric-label">Story points</p><p class="metric-value">${st.sp}</p></div>
    <div class="metric-card"><p class="metric-label">Done</p><p class="metric-value green">${st.done}</p></div>
    <div class="metric-card"><p class="metric-label">In progress</p><p class="metric-value amber">${st.inProgress}</p></div>
    <div class="metric-card"><p class="metric-label">Moved to QA</p><p class="metric-value blue">${st.qa}</p></div>
  `;

  // Progress
  document.getElementById('progress-fill').style.width = st.pct + '%';
  document.getElementById('progress-pct').textContent = st.pct + '%';
  document.getElementById('progress-label').textContent = `${st.done} of ${st.total} issues complete`;

  // Donut
  const statusOrder = ['Done (Production)','Done','MOVED TO QA','Ready For Production','In Progress','To Do','Parked','Canceled'];
  const counts = statusOrder.map(s => issues.filter(i=>i.status===s).length).filter((_,i)=>statusOrder[i]);
  const labels = ['Done (Prod)','Done','QA','Ready','In Progress','To Do','Parked','Canceled'];
  const colors = statusOrder.map(s => STATUS_COLORS[s]||'#4a4f63');
  if (donutChart) { donutChart.destroy(); donutChart = null; }
  donutChart = new Chart(document.getElementById('donut'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: counts, backgroundColor: colors, borderWidth: 0 }] },
    options: { responsive:true, maintainAspectRatio:true, cutout:'68%', plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: ctx => ` ${ctx.label}: ${ctx.raw}` } } } }
  });
  document.getElementById('donut-done').textContent = st.done;

  // Legend
  document.getElementById('status-legend').innerHTML = labels.map((lbl,i) => counts[i] > 0 ? `
    <div class="legend-item">
      <span class="legend-dot" style="background:${colors[i]}"></span>
      <span>${lbl}</span>
      <span class="legend-count">${counts[i]}</span>
    </div>` : '').join('');

  // Project bars
  const proj = {};
  issues.forEach(i => { proj[i.project]=(proj[i.project]||0)+1; });
  const sorted = Object.entries(proj).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const max = sorted[0][1];
  document.getElementById('proj-bars').innerHTML = sorted.map(([name,count]) => `
    <div class="proj-row">
      <div class="proj-meta">
        <span class="proj-name">${name}</span>
        <span class="proj-count">${count}</span>
      </div>
      <div class="proj-track"><div class="proj-fill" style="width:${Math.round((count/max)*100)}%"></div></div>
    </div>
  `).join('');

  // Team
  const team = {};
  issues.forEach(i => {
    if(!team[i.assignee]) team[i.assignee]={issues:0,sp:0};
    team[i.assignee].issues++;
    team[i.assignee].sp+=i.sp||0;
  });
  const teamSorted = Object.entries(team).sort((a,b)=>b[1].issues-a[1].issues);
  document.getElementById('team-grid').innerHTML = teamSorted.map(([name,d]) => {
    const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<div class="team-card">
      <div class="avatar">${initials}</div>
      <div style="overflow:hidden;">
        <p class="team-name">${name}</p>
        <p class="team-stats">${d.issues} issues · ${d.sp} SP</p>
      </div>
    </div>`;
  }).join('');

  // Project filter options
  const projects = [...new Set(issues.map(i=>i.project))].sort();
  const pf = document.getElementById('project-filter');
  pf.innerHTML = '<option value="all">All projects</option>' + projects.map(p=>`<option value="${p}"${currentProject===p?' selected':''}>${p}</option>`).join('');

  renderTable(issues);
}

function renderTable(issues) {
  let f = issues;
  if(currentStatus!=='all') f=f.filter(i=>i.status===currentStatus);
  if(currentProject!=='all') f=f.filter(i=>i.project===currentProject);
  document.getElementById('issue-tbody').innerHTML = f.map(i=>`
    <tr>
      <td class="key-cell">${i.key}</td>
      <td class="summary-cell" title="${i.summary}">${i.summary}</td>
      <td style="color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${i.project}</td>
      <td><span class="pill" style="background:${STATUS_BG[i.status]||'rgba(74,79,99,0.3)'};color:${STATUS_COLORS[i.status]||'#4a4f63'}">${i.status}</span></td>
      <td style="color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${i.assignee}</td>
      <td class="sp-cell">${i.sp||'—'}</td>
    </tr>
  `).join('');
}

function switchSprint(k) {
  currentSprint=k; currentStatus='all'; currentProject='all';
  document.getElementById('status-filter').value='all';
  renderAll();
}

document.getElementById('status-filter').addEventListener('change', e=>{ currentStatus=e.target.value; renderTable(SPRINTS[currentSprint].issues); });
document.getElementById('project-filter').addEventListener('change', e=>{ currentProject=e.target.value; renderTable(SPRINTS[currentSprint].issues); });

renderAll();
</script>
